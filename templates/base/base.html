<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ── Sidebar layout ── */
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 64px;
            --sidebar-bg: #1e293b;
            --sidebar-text: #cbd5e1;
            --sidebar-active-bg: #334155;
            --sidebar-hover-bg: #273548;
            --transition: 0.25s ease;
        }

        body {
            margin: 0;
            background: #f8fafc;
        }

        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            transition: width var(--transition);
            overflow: hidden;
            z-index: 1050;
            flex-shrink: 0;
        }

        #sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        #sidebar .sidebar-label {
            white-space: nowrap;
            transition: opacity var(--transition);
            opacity: 1;
        }

        #sidebar.collapsed .sidebar-label {
            opacity: 0;
            pointer-events: none;
            width: 0;
            overflow: hidden;
        }

        #sidebar.collapsed .sidebar-section-label {
            visibility: hidden;
        }

        .sidebar-brand { color: #fff !important; }

        .sidebar-item {
            color: var(--sidebar-text) !important;
            transition: background var(--transition), color var(--transition);
            min-height: 42px;
        }

        .sidebar-item:hover {
            background: var(--sidebar-hover-bg) !important;
            color: #fff !important;
        }

        .sidebar-item.active {
            background: var(--sidebar-active-bg) !important;
            color: #fff !important;
        }

        /* Main content */
        #main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            transition: margin-left var(--transition);
        }

        #main-content.sidebar-collapsed {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Mobile overlay */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1040;
        }

        /* Mobile hamburger */
        #mobile-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1060;
            background: var(--sidebar-bg);
            border: none;
            color: #fff;
            border-radius: 6px;
            padding: 6px 10px;
        }

        @media (max-width: 991px) {
            #sidebar {
                width: 0;
                transition: width var(--transition);
            }

            #sidebar.mobile-open {
                width: var(--sidebar-width);
            }

            #sidebar.mobile-open .sidebar-label {
                opacity: 1;
                width: auto;
            }

            #main-content {
                margin-left: 0 !important;
            }

            #mobile-toggle {
                display: block;
            }

            #sidebar-overlay.active {
                display: block;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}
    <!-- Mobile toggle button -->
    <button id="mobile-toggle" aria-label="Mở menu">
        <i class="bi bi-list fs-5"></i>
    </button>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay"></div>

    <!-- Sidebar -->
    {% include "base/sidebar.html" %}
{% endif %}

<!-- Main content -->
<div id="main-content" class="{% if not user.is_authenticated %}ms-0{% endif %}">
    <div class="{% if user.is_authenticated %}p-4{% else %}container py-5{% endif %}">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    var sidebar = document.getElementById('sidebar');
    var main = document.getElementById('main-content');
    var toggleBtn = document.getElementById('sidebar-toggle');
    var mobileToggle = document.getElementById('mobile-toggle');
    var overlay = document.getElementById('sidebar-overlay');

    if (!sidebar) return;

    // ── Desktop: restore collapsed state ──
    if (window.innerWidth >= 992 && localStorage.getItem('sidebarCollapsed') === '1') {
        sidebar.classList.add('collapsed');
        if (main) main.classList.add('sidebar-collapsed');
    }

    // ── Desktop toggle ──
    if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
            var collapsed = sidebar.classList.toggle('collapsed');
            if (main) main.classList.toggle('sidebar-collapsed', collapsed);
            localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
        });
    }

    // ── Mobile toggle ──
    function openMobile() {
        sidebar.classList.add('mobile-open');
        overlay.classList.add('active');
    }

    function closeMobile() {
        sidebar.classList.remove('mobile-open');
        overlay.classList.remove('active');
    }

    if (mobileToggle) {
        mobileToggle.addEventListener('click', openMobile);
    }

    if (overlay) {
        overlay.addEventListener('click', closeMobile);
    }

    // ── Bootstrap tooltips (icon-only mode) ──
    function initTooltips() {
        var els = sidebar.querySelectorAll('[data-bs-toggle="tooltip"]');
        els.forEach(function (el) {
            var existing = bootstrap.Tooltip.getInstance(el);
            if (existing) existing.dispose();
            new bootstrap.Tooltip(el, {
                trigger: sidebar.classList.contains('collapsed') ? 'hover' : 'manual',
                boundary: document.body,
            });
        });
    }

    // Re-init tooltips on toggle
    if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
            setTimeout(initTooltips, 260);
        });
    }

    initTooltips();
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
